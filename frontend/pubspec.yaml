name: agriassist_ai
description: AI-powered crop disease detection for farmers.
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  image_picker: ^1.0.7
  camera: ^0.10.5+5
  http: ^1.1.0
  provider: ^6.1.1
  intl: ^0.19.0
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  flutter_native_splash: ^2.3.8
  google_fonts: ^6.1.0
  google_sign_in: ^6.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/splash.png
    - assets/i18n/en.json
    - assets/i18n/hi.json
